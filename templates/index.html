<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHB-832SD Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* ============================================================
           CSS LENGKAP
           ============================================================ */
        :root {
            --primary: #800020;
            --primary-light: #a0002a;
            --primary-bg: #fdf2f4;
            --primary-gradient: linear-gradient(135deg, #800020, #a0002a);
            --secondary: #1a73e8;
            --secondary-light: #4a9af5;
            --secondary-bg: #e8f0fe;
            --success: #22c55e;
            --success-bg: #dcfce7;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --purple: #8b5cf6;
            --purple-bg: #f5f3ff;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
            --shadow-xl: 0 20px 60px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            height: 100vh;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:var(--gray-100); border-radius:10px; }
        ::-webkit-scrollbar-thumb { background:var(--gray-300); border-radius:10px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--primary); }

        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }
        .sidebar-toggle:hover { transform: scale(1.05); }
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
        }
        .sidebar.open { transform: translateX(0) !important; }

        .full-page-mode .app-container { display: block !important; }
        .full-page-mode .sidebar { display: none !important; }
        .full-page-mode .main-content {
            padding: 24px 30px 30px 30px !important;
            margin-left: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
        }
        .full-page-mode .sidebar-toggle { display: none !important; }

        @media (max-width:768px) {
            .sidebar-toggle { display: block; }
            .sidebar {
                position: fixed;
                top: 0; left: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 999;
                width: 280px;
                box-shadow: var(--shadow-lg);
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .main-content { padding-top: 60px; }
        }
        @media (min-width:769px) {
            .sidebar-toggle { display: none !important; }
            .sidebar-overlay { display: none !important; }
        }

        #loginPage {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #800020, #a0002a, #1a73e8);
            padding: 20px;
        }
        .login-container {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }
        .login-container .logo { text-align: center; margin-bottom: 30px; }
        .login-container .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-container .logo p { color: var(--gray-500); font-size: 14px; }
        .login-container .form-group { margin-bottom: 18px; }
        .login-container label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 5px;
        }
        .login-container label i { color: var(--primary); margin-right: 6px; }
        .login-container input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: var(--transition);
        }
        .login-container input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(128,0,32,0.1);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(128,0,32,0.3); }
        .login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; display: none; }
        .login-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-100);
            font-size: 12px;
            color: var(--gray-500);
        }
        .login-footer .email { font-size: 11px; color: var(--gray-400); }

        #app { display: none; height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; overflow: hidden; }

        .sidebar {
            width: 250px;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
            overflow-y: auto;
            height: 100vh;
        }
        .sidebar-brand { padding: 0 20px 20px 20px; border-bottom: 1px solid var(--gray-100); }
        .sidebar-brand h2 {
            font-size: 20px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-brand small { font-size: 11px; color: var(--gray-500); display: block; }
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            margin: 15px 15px 18px 15px;
            background: var(--primary-bg);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(128,0,32,0.15);
        }
        .sidebar-user .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }
        .sidebar-user .user-info { flex: 1; }
        .sidebar-user .user-info .name { font-size: 14px; font-weight: 600; color: var(--gray-800); }
        .sidebar-user .user-info .role { font-size: 11px; color: var(--gray-500); }
        .sidebar-user .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1;}50%{opacity:0.3;} }

        .menu-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-400);
            padding: 0 20px;
            margin: 8px 0 6px 0;
            font-weight: 600;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            margin: 2px 10px;
            border-radius: var(--radius-sm);
            color: var(--gray-600);
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            background: transparent;
            width: calc(100% - 20px);
            text-align: left;
        }
        .menu-item i { width: 20px; font-size: 15px; color: var(--gray-400); }
        .menu-item:hover { background: var(--primary-bg); color: var(--primary); }
        .menu-item:hover i { color: var(--primary); }
        .menu-item.active { background: var(--primary-bg); color: var(--primary); font-weight: 600; }
        .menu-item.active i { color: var(--primary); }
        .menu-item.logout {
            margin-top: auto;
            border-top: 1px solid var(--gray-100);
            padding-top: 16px;
            color: var(--danger);
        }
        .menu-item.logout i { color: var(--danger); }
        .menu-item.logout:hover { background: var(--danger-bg); color: #dc2626; }

        .sidebar-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--gray-100);
            margin-top: 10px;
            text-align: center;
            font-size: 10px;
            color: var(--gray-400);
        }
        .sidebar-footer .email { display: block; font-size: 9px; color: var(--gray-500); }

        .main-content {
            flex: 1;
            padding: 24px 30px 30px 30px;
            overflow-y: auto;
            background: var(--gray-50);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .page-header h1 { font-size: 24px; font-weight: 700; color: var(--gray-900); }
        .page-header h1 small { font-size: 14px; font-weight: 400; color: var(--gray-500); margin-left: 10px; }
        .page-header h1 i { color: var(--primary); margin-right: 8px; }
        .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .header-time {
            background: var(--white);
            padding: 7px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-700);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-time i { color: var(--primary); }
        .user-login-info {
            background: var(--white);
            padding: 7px 16px;
            border-radius: 30px;
            font-size: 12px;
            color: var(--gray-500);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-login-info i { color: var(--secondary); }

        /* HISTORY SPECIFIC STYLES */
        .history-toolbar {
            background: var(--white);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .history-toolbar .search-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
        }
        .history-toolbar .search-group input,
        .history-toolbar .search-group select {
            padding: 8px 14px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 13px;
            outline: none;
            transition: var(--transition);
            background: var(--white);
            min-width: 120px;
        }
        .history-toolbar .search-group input:focus,
        .history-toolbar .search-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(128,0,32,0.1);
        }
        .history-toolbar .search-group input { flex: 1; min-width: 150px; }
        .history-toolbar .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .history-toolbar .delete-selected {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .history-toolbar .delete-selected:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(239,68,68,0.3);
        }
        .history-toolbar .delete-selected:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--primary-gradient); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(128,0,32,0.3); }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover { background: #1557b0; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(26,115,232,0.3); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #16a34a; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(34,197,94,0.3); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
        .btn-warning { background: var(--warning); color: white; }
        .btn-warning:hover { background: #d97706; transform: translateY(-2px); }
        .btn-purple { background: var(--purple); color: white; }
        .btn-purple:hover { background: #7c3aed; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gray-200); color: var(--gray-600); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }
        .btn-sm { padding: 4px 12px; font-size: 11px; }
        .btn-xs { padding: 2px 8px; font-size: 10px; border-radius: 6px; }

        .table-container {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            min-height: 400px;
        }
        .table-container .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .table-container .table-header .table-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-800);
        }
        .table-container .table-header .table-title i { color: var(--primary); margin-right: 8px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th {
            text-align: left;
            padding: 12px 14px;
            background: var(--secondary-bg);
            color: var(--gray-700);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--secondary);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        table td { padding: 10px 14px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); vertical-align: middle; }
        table tr:hover td { background: var(--primary-bg); }
        table .table-checkbox { 
            width: 16px; 
            height: 16px; 
            accent-color: var(--primary); 
            cursor: pointer;
        }
        .table-scroll { overflow-y: auto; max-height: 450px; }

        .status-badge {
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        .status-badge.normal { background: var(--success-bg); color: #065f46; }
        .status-badge.warning { background: var(--warning-bg); color: #d97706; }
        .status-badge.danger { background: var(--danger-bg); color: #dc2626; }

        .trend-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
        }
        .trend-indicator.up { color: var(--danger); }
        .trend-indicator.down { color: var(--success); }
        .trend-indicator.stable { color: var(--warning); }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--white);
            padding: 14px 22px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            border-left: 4px solid var(--success);
            z-index: 9999;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--gray-800);
            animation: slideUp 0.3s ease;
            min-width: 200px;
        }
        .toast .toast-content { display: flex; align-items: center; gap: 10px; }
        .toast .toast-content i { font-size: 18px; }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .empty-state { text-align: center; padding: 30px; color: var(--gray-400); font-size: 14px; }
        .empty-state i { font-size: 40px; display: block; margin-bottom: 12px; color: var(--gray-300); }
        .empty-state p { margin-top: 4px; }

        .password-modal .modal-content { max-width: 400px; }
        .password-modal .form-group { margin-bottom: 16px; }
        .password-modal .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 4px;
        }
        .password-modal .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: var(--transition);
        }
        .password-modal .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(128,0,32,0.1);
        }

        .company-profile-top {
            background: var(--white);
            border-radius: var(--radius);
            padding: 12px 20px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .company-profile-top .company-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--gray-800);
        }
        .company-profile-top .company-name i { color: var(--primary); margin-right: 8px; }
        .company-profile-top .company-detail {
            font-size: 13px;
            color: var(--gray-500);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .company-profile-top .company-detail span { display: flex; align-items: center; gap: 4px; }
        .company-profile-top .company-detail i { color: var(--secondary); font-size: 12px; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-bottom: 18px;
        }
        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 18px 22px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
            transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .stat-card.blue { border-left-color: var(--secondary); }
        .stat-card.green { border-left-color: var(--success); }
        .stat-card.purple { border-left-color: var(--purple); }
        .stat-card .label { font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; }
        .stat-card .label i { margin-right: 5px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: var(--gray-900); margin-top: 4px; }
        .stat-card .value .unit { font-size: 16px; color: var(--gray-400); }
        .stat-card .sub { font-size: 12px; color: var(--gray-400); margin-top: 4px; }

        .dashboard-bottom {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 18px;
            margin-bottom: 18px;
        }
        .chart-container {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .chart-container .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .chart-container .chart-header h3 { font-size: 15px; font-weight: 600; color: var(--gray-800); }
        .chart-container .chart-header h3 i { color: var(--primary); margin-right: 8px; }
        .chart-container .chart-header .chart-label { font-size: 12px; color: var(--gray-400); }
        .chart-container canvas { width: 100% !important; max-height: 280px; display: block; }

        .info-side { display: flex; flex-direction: column; gap: 18px; }
        .schedule-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            flex: 1;
            max-height: 340px;
            overflow-y: auto;
        }
        .schedule-card h3 { 
            font-size: 15px; 
            font-weight: 600; 
            color: var(--gray-800); 
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .schedule-card h3 i { color: var(--primary); }
        .schedule-card h3 .badge-count {
            font-size: 12px;
            font-weight: 500;
            color: var(--gray-500);
            margin-left: auto;
        }
        .schedule-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--primary-bg);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            border-left: 3px solid var(--primary);
        }
        .schedule-item .time { font-size: 12px; font-weight: 600; color: var(--primary); min-width: 55px; }
        .schedule-item .info { flex: 1; }

                        tekanan: tekanan,

        // ============================================================
        // API CALLS
        // ============================================================
        const API = {
            async get(endpoint) {
                if (endpoint === '/api/users') return { success: true, users: Store.users };
                if (endpoint === '/api/schedules') return { success: true, schedules: Store.schedules };
                if (endpoint === '/api/history') return { success: true, history: Store.historyData };
                if (endpoint === '/api/settings') return { success: true, settings: Store.settings };
                if (endpoint === '/api/profile') return { success: true, profile: Store.profile };
                if (endpoint === '/api/data') {
                    const data = await fetchThingspeakData();
                    return { success: true, data: data };
                }
                return { success: true };
            },
            async post(endpoint, data) {
                if (endpoint === '/api/login') {
                    const user = Store.users.find(u => u.name.toLowerCase() === data.username);
                    if (user && user.password === data.password) {
                        return { success: true, user: JSON.parse(JSON.stringify(user)) };
                    }
                    return { success: false, message: 'Username atau password salah!' };
                }
                if (endpoint === '/api/users') {
                    const newUser = { ...data, id: Date.now(), avatar: data.name.charAt(0).toUpperCase() };
                    Store.users.push(newUser);
                    return { success: true, user: newUser };
                }
                if (endpoint === '/api/schedules') {
                    const newSchedule = { ...data, id: Date.now(), fotoTime: new Date().toISOString() };
                    Store.schedules.push(newSchedule);
                    return { success: true, schedule: newSchedule };
                }
                if (endpoint === '/api/history/delete') {
                    const ids = data.ids || [];
                    Store.historyData = Store.historyData.filter(h => !ids.includes(h.id));
                    return { success: true, deleted: ids.length };
                }
                if (endpoint === '/api/profile') {
                    Store.profile = { ...Store.profile, ...data };
                    return { success: true, profile: Store.profile };
                }
                if (endpoint === '/api/settings') {
                    Store.settings = { ...Store.settings, ...data };
                    return { success: true, settings: Store.settings };
                }
                return { success: true };
            },
            async put(endpoint, data) {
                const id = parseInt(endpoint.split('/').pop());
                if (endpoint.includes('/api/users/')) {
                    const idx = Store.users.findIndex(u => u.id === id);
                    if (idx !== -1) {
                        Store.users[idx] = { ...Store.users[idx], ...data };
                        return { success: true, user: Store.users[idx] };
                    }
                }
                if (endpoint.includes('/api/schedules/')) {
                    const idx = Store.schedules.findIndex(s => s.id === id);
                    if (idx !== -1) {
                        Store.schedules[idx] = { ...Store.schedules[idx], ...data, fotoTime: new Date().toISOString() };
                        return { success: true, schedule: Store.schedules[idx] };
                    }
                }
                return { success: false };
            },
            async delete(endpoint) {
                const id = parseInt(endpoint.split('/').pop());
                if (endpoint.includes('/api/users/')) {
                    Store.users = Store.users.filter(u => u.id !== id);
                    return { success: true };
                }
                if (endpoint.includes('/api/schedules/')) {
                    Store.schedules = Store.schedules.filter(s => s.id !== id);
                    return { success: true };
                }
                if (endpoint.includes('/api/history/')) {
                    Store.historyData = Store.historyData.filter(h => h.id !== id);
                    return { success: true };
                }
                return { success: false };
            }
        };

        // ============================================================
        // FETCH DATA DARI THINGSPEAK
        // ============================================================
        async function fetchThingspeakData() {
            const { channelId, readApiKey, fieldSuhu, fieldKelembaban, fieldTekanan } = THINGSPEAK_CONFIG;

            if (channelId === 'YOUR_CHANNEL_ID' || readApiKey === 'YOUR_READ_API_KEY') {
                Store.thingspeakStatus = 'not_configured';
                return {
                    suhu: 23 + Math.random() * 4,
                    kelembaban: 41 + Math.random() * 6,
                    tekanan: 1009 + Math.random() * 3,
                    waktu: new Date().toISOString(),
                    source: 'simulasi'
                };
            }

            try {
                const url = `https://api.thingspeak.com/channels/${channelId}/feeds.json?api_key=${readApiKey}&results=1`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();

                if (data.feeds && data.feeds.length > 0) {
                    const feed = data.feeds[0];
                    const suhu = parseFloat(feed[fieldSuhu]) || 0;
                    const kelembaban = parseFloat(feed[fieldKelembaban]) || 0;
                    const tekanan = parseFloat(feed[fieldTekanan]) || 0;

                    Store.thingspeakStatus = 'connected';
                    
                    const result = {
                        suhu: suhu,
                        kelembaban: kelembaban,
                        tekanan: tekanan,
                        waktu: feed.created_at || new Date().toISOString(),
                        source: 'thingspeak'
                    };

                    Store.lastSensorData = result;
                    return result;
                } else {
                    Store.thingspeakStatus = 'no_data';
                    if (Store.lastSensorData) return Store.lastSensorData;
                    return {
                        suhu: 23 + Math.random() * 4,
                        kelembaban: 41 + Math.random() * 6,
                        tekanan: 1009 + Math.random() * 3,
                        waktu: new Date().toISOString(),
                        source: 'simulasi'
                    };
                }
            } catch (error) {
                console.error('❌ Error fetching from ThingSpeak:', error);
                Store.thingspeakStatus = 'error';
                if (Store.lastSensorData) return Store.lastSensorData;
                return {
                    suhu: 23 + Math.random() * 4,
                    kelembaban: 41 + Math.random() * 6,
                    tekanan: 1009 + Math.random() * 3,
                    waktu: new Date().toISOString(),
                    source: 'simulasi'
                };
            }
        }

        // ============================================================
        // HELPERS
        // ============================================================
        function formatTime(date) {
            const pad = (n) => String(n).padStart(2, '0');
            return pad(date.getHours()) + ':' + pad(date.getMinutes()) + ':' + pad(date.getSeconds());
        }

        function formatDateTime(date) {
            return date.toLocaleString('id-ID', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function showToast(message, type = 'success') {
            const colors = { success: '#22c55e', error: '#ef4444', warning: '#f59e0b', info: '#1a73e8' };
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle' };
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.borderLeftColor = colors[type] || colors.success;
            t.innerHTML = '<div class="toast-content"><i class="fas ' + (icons[type] || icons.success) +
                '" style="color:' + (colors[type] || colors.success) + ';"></i><span>' + message + '</span></div>';
            document.body.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translateY(20px)';
                t.style.transition = 'all 0.3s ease';
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        function navigateTo(page) {
            const user = Store.currentUser;

                if (user.access[page] !== true) {

            const fullPageMenus = ['history', 'setting', 'usermanagement', 'schedule', 'profile', 'map'];
            document.getElementById('app').classList.toggle('full-page-mode', fullPageMenus.includes(page));

            document.querySelectorAll('.menu-item[data-page]').forEach(m => m.classList.remove('active'));
            const mi = document.querySelector('.menu-item[data-page="' + page + '"]');
            if (mi) mi.classList.add('active');

            if (page !== 'dashboard' && window.dashboardInterval) {
                clearInterval(window.dashboardInterval);
                window.dashboardInterval = null;
            }

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('active');
            }

            const renderers = {
                dashboard: renderDashboard,
                setting: renderSetting,
                history: renderHistory,
                usermanagement: renderUserManagement,
                schedule: renderSchedule,
                profile: renderProfile,
                map: renderMap
            };
            if (renderers[page]) renderers[page]();
            else renderDashboard();
            document.getElementById('mainContent').scrollTop = 0;
        }

            const access = defaultAccess[role] || defaultAccess['Viewer'];

        // ============================================================
        // SAVE MODAL DATA
        // ============================================================
        async function saveModalData(e) {
            e.preventDefault();
            const type = document.getElementById('modalType').value;
            const id = document.getElementById('modalId').value;

            if (type === 'user') {
                const nameEl = document.getElementById('m_name');
                const emailEl = document.getElementById('m_email');
                const roleEl = document.getElementById('m_role');
                const passwordEl = document.getElementById('m_password');

                if (!nameEl) { showToast('Form tidak lengkap!', 'error'); return; }

                const name = nameEl.value.trim();
                const email = emailEl ? emailEl.value.trim() : '';
                const role = roleEl ? roleEl.value : 'Viewer';
                const password = passwordEl ? passwordEl.value.trim() : 'default123';

                if (!name) { showToast('Nama harus diisi!', 'warning'); return; }

                const access = {};
                document.querySelectorAll('.m-access-check').forEach(cb => {
                    access[cb.dataset.access] = cb.checked;
                });
                access.dashboard = true;

                const data = { name, email, role, password, access };

                if (id) {
                    const result = await API.put('/api/users/' + id, data);
                    if (result.success) {
                        showToast('✅ User diupdate!', 'success');
                        closeModal();
                        await loadUsers();
                        renderUserManagement();
                        if (Store.currentUser && Store.currentUser.id === parseInt(id)) {
                            Store.currentUser = result.user;
                            updateSidebarUser();
                            renderSidebarByAccess();
                        }
                    }
                } else {
                    const result = await API.post('/api/users', data);
                    if (result.success) {
                        showToast('✅ User ditambahkan!', 'success');
                        closeModal();
                        await loadUsers();
                        renderUserManagement();
                    }
                }
            } else if (type === 'schedule') {
                const tglPengajuan = document.getElementById('m_tglPengajuan');
                const tglPelaksana = document.getElementById('m_tglPelaksana');
                const customer = document.getElementById('m_customer');
                const namaTeknis = document.getElementById('m_namaTeknis');
                const namaSales = document.getElementById('m_namaSales');
                const lokasiCustomer = document.getElementById('m_lokasiCustomer');
                const jamMulai = document.getElementById('m_jamMulai');
                const jamSelesai = document.getElementById('m_jamSelesai');
                const keterangan = document.getElementById('m_keterangan');
                const status = document.getElementById('m_status');

                if (!customer || !namaTeknis || !lokasiCustomer) {
                    showToast('Form tidak lengkap!', 'error');
                    return;
                }

                const data = {
                    tglPengajuan: tglPengajuan ? tglPengajuan.value : new Date().toISOString().split('T')[0],
                    tglPelaksana: tglPelaksana ? tglPelaksana.value : new Date().toISOString().split('T')[0],
                    customer: customer.value.trim(),
                    namaTeknis: namaTeknis.value.trim(),
                    namaSales: namaSales ? namaSales.value.trim() : '',
                    lokasiCustomer: lokasiCustomer.value.trim(),
                    jamMulai: jamMulai ? jamMulai.value : '09:00',
                    jamSelesai: jamSelesai ? jamSelesai.value : '17:00',
                    keterangan: keterangan ? keterangan.value.trim() : '',
                    status: status ? status.value : 'On Progress'
                };

                // Handle foto upload
                const fotoInput = document.getElementById('m_foto');
                if (fotoInput && fotoInput.files && fotoInput.files.length > 0) {
                    const file = fotoInput.files[0];
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        data.foto = event.target.result;
                        data.fotoName = file.name;
                        data.fotoTime = new Date().toISOString();
                        // Handle document upload
                        const docInput = document.getElementById('m_document');
                        if (docInput && docInput.files && docInput.files.length > 0) {
                            const docFile = docInput.files[0];
                            const docReader = new FileReader();
                            docReader.onload = function(docEvent) {
                                data.document = docEvent.target.result;
                                data.documentName = docFile.name;
                                saveScheduleData(data, id);
                            };
                            docReader.readAsDataURL(docFile);
                        } else {
                            saveScheduleData(data, id);
                        }
                    };
                    reader.readAsDataURL(file);
                    return;
                }

                // Handle document only (no foto)
                const docInput = document.getElementById('m_document');
                if (docInput && docInput.files && docInput.files.length > 0) {
                    const file = docInput.files[0];
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        data.document = event.target.result;
                        data.documentName = file.name;
                        saveScheduleData(data, id);
                    };
                    reader.readAsDataURL(file);
                    return;
                }

                saveScheduleData(data, id);
            } else if (type === 'profile') {
                const nama = document.getElementById('m_nama');
                const alamat = document.getElementById('m_alamat');
                const telp = document.getElementById('m_telp');
                const email = document.getElementById('m_email');
                const website = document.getElementById('m_website');

                const data = {
                    nama: nama ? nama.value.trim() : Store.profile.nama,
                    alamat: alamat ? alamat.value.trim() : Store.profile.alamat,
                    telp: telp ? telp.value.trim() : Store.profile.telp,
                    email: email ? email.value.trim() : Store.profile.email,
                    website: website ? website.value.trim() : Store.profile.website
                };

                const result = await API.post('/api/profile', data);
                if (result.success) {
                    showToast('✅ Profil perusahaan diupdate!', 'success');
                    closeModal();
                    await loadProfile();
                    renderProfile();
                }
            }
        }

                showToast('Customer, Teknis, dan Lokasi harus diisi!', 'warning');

        // ============================================================
        // SAVE DATA INTERVAL
        // ============================================================
        function startSaveInterval() {
            // Clear existing interval
            if (saveIntervalTimer) {
                clearInterval(saveIntervalTimer);
                saveIntervalTimer = null;
            }

            const intervalMinutes = Store.settings.saveInterval || 5;
            const intervalMs = intervalMinutes * 60 * 1000;

            console.log(`⏰ Save interval set to ${intervalMinutes} minutes (${intervalMs}ms)`);

            // Save immediately on start
            performSaveData();

            // Start interval
            saveIntervalTimer = setInterval(() => {
                performSaveData();
            }, intervalMs);
        }

        async function performSaveData() {
            if (isSavingInProgress) {
                console.log('⏳ Save already in progress, skipping...');
                return;
            }

            isSavingInProgress = true;
            console.log('💾 Saving data at:', new Date().toLocaleString());

            try {
                // Get current sensor data
                const sensorData = await fetchThingspeakData();
                
                if (sensorData && sensorData.source === 'thingspeak') {
                    const suhu = sensorData.suhu;
                    const kelembaban = sensorData.kelembaban;
                    const tekanan = sensorData.tekanan;
                    const status = suhu > 25 ? 'danger' : suhu > 23 ? 'warning' : 'normal';
                    const trend = Store.historyData.length > 0 ? 
                        (suhu > Store.historyData[0].suhu ? 'up' : suhu < Store.historyData[0].suhu ? 'down' : 'stable') : 
                        'stable';
                    
                    // Save to history
                    Store.historyData.unshift({
                        id: Date.now(),
                        waktu: sensorData.waktu || new Date().toISOString(),
                        suhu: suhu,
                        kelembaban: kelembaban,
                        tekanan: tekanan,
                        status: status,
                        userlogin: Store.currentUser?.name || 'system',
                        trend: trend
                    });
                    
                    if (Store.historyData.length > 100) {
                        Store.historyData = Store.historyData.slice(0, 100);
                    }

                    Store.lastSaveTime = new Date();
                    updateNextSaveTime();
                    
                    // Update UI
                    updateSensorUI(sensorData);
                    updateChartData(sensorData);
                    updateLastUpdateStatus(new Date(sensorData.waktu));
                    
                    if (document.getElementById('historyTableBody')) {
                        renderHistory();
                    }
                    
                    console.log('✅ Data saved successfully at:', Store.lastSaveTime.toLocaleString());
                    showToast(`💾 Data saved at ${formatTime(Store.lastSaveTime)}`, 'info');
                } else {
                    console.warn('⚠️ No valid sensor data to save');
                }
            } catch (error) {
                console.error('❌ Error saving data:', error);
            } finally {
                isSavingInProgress = false;
            }
        }

        function updateNextSaveTime() {
            const el = document.getElementById('nextSaveTime');
            if (!el) return;
            
            if (!Store.lastSaveTime) {
                el.textContent = 'Belum ada save';
                return;
            }
            
            const intervalMs = (Store.settings.saveInterval || 5) * 60 * 1000;
            const nextTime = new Date(Store.lastSaveTime.getTime() + intervalMs);
            const diff = Math.floor((nextTime - new Date()) / 60000);
            
            if (diff < 0) {
                el.textContent = 'Segera';
                el.style.color = '#f97316';
            } else {
                el.textContent = diff + ' menit';
                el.style.color = '#22c55e';
            }
        }

        function updateFotoSection() {

                if (s.status !== 'Done' || !s.foto) return false;
                if (s.fotoTime) {
                    const fotoDate = new Date(s.fotoTime);
                    return fotoDate >= twentyFourHoursAgo;
                }
                return false;
            });
            
            const fotoSection = document.querySelector('.foto-section');
            if (!fotoSection) return;

            const fotoHeader = fotoSection.querySelector('.foto-header .badge-count');
            if (fotoHeader) {
                fotoHeader.textContent = `(${doneSchedules.length} foto)`;

            const fotoGrid = fotoSection.querySelector('.foto-grid');
            if (fotoGrid) {
                if (doneSchedules.length > 0) {

        function updateThingspeakStatus() {
            const status = Store.thingspeakStatus;
            const el = document.getElementById('thingspeakStatus');
            if (!el) return;

            const statusMap = {
                'connected': { text: '✅ ThingSpeak Connected', color: 'var(--success)', dot: 'online' },
                'disconnected': { text: '⏳ Menghubungkan...', color: 'var(--warning)', dot: 'offline' },
                'error': { text: '❌ Gagal terhubung ke ThingSpeak', color: 'var(--danger)', dot: 'offline' },
                'no_data': { text: '⚠️ Tidak ada data dari ThingSpeak', color: 'var(--warning)', dot: 'offline' },
                'not_configured': { text: '⚙️ ThingSpeak belum dikonfigurasi', color: 'var(--gray-500)', dot: 'offline' }
            };

            const info = statusMap[status] || statusMap['disconnected'];
            el.innerHTML = `<span class="dot ${info.dot}"></span> ${info.text}`;
            el.style.color = info.color;
        }

        function updateSensorUI(data) {
            const s = document.getElementById('dashSuhu');
            const k = document.getElementById('dashKelembaban');
            const t = document.getElementById('dashTekanan');
            if (s) s.innerHTML = data.suhu.toFixed(1) + ' <span class="unit">°C</span>';
            if (k) k.innerHTML = data.kelembaban.toFixed(1) + ' <span class="unit">%</span>';
            if (t) t.innerHTML = data.tekanan.toFixed(1) + ' <span class="unit">hPa</span>';

            const waktu = new Date(data.waktu);
            const waktuStr = formatTime(waktu);
            ['suhuTime', 'kelembabanTime', 'tekananTime', 'lastSaveTime'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.textContent = waktuStr;
            });

            const sourceLabel = document.getElementById('dataSourceLabel');
            if (sourceLabel) {
                sourceLabel.textContent = data.source === 'thingspeak' ? '📡 ThingSpeak' : '🔄 Simulasi';
                sourceLabel.style.color = data.source === 'thingspeak' ? 'var(--success)' : 'var(--warning)';
            }
        }

        function updateChartData(data) {
            const now = new Date();
            const label = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
            const d = Store.chartData;
            d.labels.push(label);
            d.suhu.push(parseFloat(data.suhu));
            d.kelembaban.push(parseFloat(data.kelembaban));
            d.tekanan.push(parseFloat(data.tekanan));
            if (d.labels.length > 30) {
                d.labels.shift();

        // ============================================================
        // RENDER CHART
        // ============================================================
        function renderChart() {
            const canvas = document.getElementById('trendChart');
            if (!canvas) return;
            const d = Store.chartData;
            const s = Store.settings;
            if (d.labels.length === 0) {
                for (let i = 29; i >= 0; i--) {
                    const h = new Date();
                    h.setMinutes(h.getMinutes() - i);
                    d.labels.push(h.getHours() + ':' + String(h.getMinutes()).padStart(2, '0'));
                    d.suhu.push(23 + Math.random() * 4);
                    d.kelembaban.push(41 + Math.random() * 6);
                    d.tekanan.push(1009 + Math.random() * 3);
                }
            }
            const ctx = canvas.getContext('2d');
            const w = canvas.parentElement.clientWidth - 40;
            const h = 280;
            canvas.width = w;
            canvas.height = h;
            const pad = { top: 30, bottom: 60, left: 55, right: 30 };
            const cw = w - pad.left - pad.right;
            const ch = h - pad.top - pad.bottom;
            ctx.clearRect(0, 0, w, h);
            const allSuhu = [...d.suhu, s.suhuMin || 18, s.suhuMax || 26];
            const suhuMinVal = Math.min(...allSuhu) - 1;
            const suhuMaxVal = Math.max(...allSuhu) + 1;
            const suhuRange = suhuMaxVal - suhuMinVal || 1;
            const allKelem = [...d.kelembaban, s.kelembabanMin || 20, s.kelembabanMax || 60];
            const kelemMinVal = Math.min(...allKelem) - 2;
            const kelemMaxVal = Math.max(...allKelem) + 2;
            const kelemRange = kelemMaxVal - kelemMinVal || 1;
            const tekanMinVal = Math.min(...d.tekanan) - 2;
            const tekanMaxVal = Math.max(...d.tekanan) + 2;
            const tekanRange = tekanMaxVal - tekanMinVal || 1;

            ctx.strokeStyle = '#f0f0f0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = pad.top + (ch / 5) * i;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();
            }

            function drawLine(data, color, minVal, maxVal, range, showMinMax = true, minLimit = null, maxLimit = null) {
                if (data.length < 2) return;
                if (showMinMax && minLimit !== null && maxLimit !== null) {
                    const minY = pad.top + ch - ((minLimit - minVal) / range) * ch;
                    const maxY = pad.top + ch - ((maxLimit - minVal) / range) * ch;
                    ctx.fillStyle = 'rgba(34, 197, 94, 0.06)';
                    ctx.fillRect(pad.left, Math.min(minY, maxY), cw, Math.abs(maxY - minY));
                }
                ctx.strokeStyle = color;
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                data.forEach((v, i) => {
                    const x = pad.left + (i / (data.length - 1)) * cw;
                    const y = pad.top + ch - ((v - minVal) / range) * ch;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                });
                ctx.stroke();
                data.forEach((v, i) => {
                    const x = pad.left + (i / (data.length - 1)) * cw;
                    const y = pad.top + ch - ((v - minVal) / range) * ch;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                });
                if (showMinMax && minLimit !== null && maxLimit !== null) {
                    const minY = pad.top + ch - ((minLimit - minVal) / range) * ch;
                    const maxY = pad.top + ch - ((maxLimit - minVal) / range) * ch;
                    ctx.setLineDash([6, 4]);
                    ctx.strokeStyle = '#eab308';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(pad.left, minY);
                    ctx.lineTo(w - pad.right, minY);
                    ctx.stroke();
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(pad.left, maxY);
                    ctx.lineTo(w - pad.right, maxY);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.fillStyle = '#eab308';
                    ctx.font = '9px Arial';
                    ctx.textAlign = 'right';
                    ctx.fillText('Min: ' + minLimit.toFixed(1), pad.left - 3, minY + 3);
                    ctx.fillStyle = '#ef4444';
                    ctx.fillText('Max: ' + maxLimit.toFixed(1), pad.left - 3, maxY + 3);
                }
            }
            drawLine(d.suhu, '#f97316', suhuMinVal, suhuMaxVal, suhuRange, true, s.suhuMin || 18, s.suhuMax || 26);
            drawLine(d.kelembaban, '#3b82f6', kelemMinVal, kelemMaxVal, kelemRange, true, s.kelembabanMin || 20, s
                .kelembabanMax || 60);
            drawLine(d.tekanan, '#ef4444', tekanMinVal, tekanMaxVal, tekanRange, false, null, null);

            ctx.fillStyle = '#999';
            ctx.font = '9px Arial';
            ctx.textAlign = 'center';
            const step = Math.max(1, Math.floor(d.labels.length / 8));
            for (let i = 0; i < d.labels.length; i += step) {
                const x = pad.left + (i / (d.labels.length - 1)) * cw;
                ctx.fillText(d.labels[i], x, h - 20);
            }
            ctx.fillStyle = '#999';
            ctx.font = '9px Arial';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const y = pad.top + (ch / 5) * i;
                const val = suhuMaxVal - (suhuRange / 5) * i;
                ctx.fillText(val.toFixed(1), pad.left - 5, y + 3);
            }

            const lx = 20,
                ly = h - 8;
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.shadowColor = 'rgba(0,0,0,0.05)';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.roundRect(lx, ly - 55, w - 40, 50, 6);
            ctx.fill();
            ctx.shadowBlur = 0;
            let lxPos = lx + 12,
                lyPos = ly - 47;
            const legends = [
                { color: '#f97316', label: 'Suhu' },
                { color: '#3b82f6', label: 'Kelembaban' },
                { color: '#ef4444', label: 'Tekanan' }
            ];
            legends.forEach((l) => {
                ctx.fillStyle = l.color;
                ctx.fillRect(lxPos, lyPos, 14, 12);
                ctx.fillStyle = '#333';
                ctx.font = '9px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(l.label, lxPos + 18, lyPos + 10);
                lxPos += 80;
            });
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        function changeInterval(delta) {
            const input = document.getElementById('saveInterval');
            const display = document.getElementById('intervalDisplay');
            let current = parseInt(input.value) || 5;
            let newValue = current + delta;
            
            // Batas interval: 1 menit - 60 menit
            if (newValue < 1) newValue = 1;
            if (newValue > 60) newValue = 60;
            
            input.value = newValue;
            display.textContent = newValue;
            
            // Update info text
            const infoDiv = display.parentElement.parentElement.querySelector('div[style*="margin-top:8px"]');
            if (infoDiv) {
                const interval = newValue;
                let text = `Interval saat ini: <strong>${interval} menit</strong>`;
                if (interval <= 1) text += ' (Setiap 1 menit)';
                else if (interval <= 5) text += ' (Setiap 5 menit)';
                else if (interval <= 15) text += ' (Setiap 15 menit)';
                else if (interval <= 30) text += ' (Setiap 30 menit)';
                else text += ' (Setiap 1 jam)';
                infoDiv.innerHTML = text;
            }
            
            // Update info box
            const infoBox = document.querySelector('.settings-card .info-box:first-of-type');
            if (infoBox) {
                infoBox.innerHTML = `<i class="fas fa-info-circle"></i> <span>Data akan disimpan secara otomatis setiap <strong>${newValue} menit</strong></span>`;
            }
            
            // Update summary
            updateSettingNextSave();
        }

        function updateSettingNextSave() {
            const el = document.getElementById('settingNextSave');
            if (!el) return;
            
            const interval = parseInt(document.getElementById('saveInterval').value) || 5;
            const lastSave = Store.lastSaveTime;
            
            if (!lastSave) {
                el.textContent = 'Belum ada save';
                return;
            }
            
            const intervalMs = interval * 60 * 1000;
            const nextTime = new Date(lastSave.getTime() + intervalMs);
            const diff = Math.floor((nextTime - new Date()) / 60000);
            
            if (diff < 0) {
                el.textContent = 'Segera';
                el.style.color = '#f97316';
            } else {
                el.textContent = diff + ' menit';
                el.style.color = '#22c55e';
            }
        }

        // ============================================================
        // RENDER HISTORY TREND CHART - DENGAN BATAS ATAS & BAWAH
        // ============================================================
        function renderHistoryTrendChart() {
            const canvas = document.getElementById('historyTrendChart');
            if (!canvas) return;

            const data = Store.historyData.slice(0, 50).reverse();
            if (data.length === 0) return;

            const ctx = canvas.getContext('2d');
            const container = canvas.parentElement;
            const w = container.clientWidth - 40;
            const h = 250;
            canvas.width = w;
            canvas.height = h;

            const pad = { top: 30, bottom: 40, left: 50, right: 20 };
            const cw = w - pad.left - pad.right;
            const ch = h - pad.top - pad.bottom;

            ctx.clearRect(0, 0, w, h);

            const suhuValues = data.map(d => d.suhu);
            const kelembabanValues = data.map(d => d.kelembaban);
            const tekananValues = data.map(d => d.tekanan);
            
            const allValues = [...suhuValues, ...kelembabanValues, ...tekananValues];
            const minVal = Math.min(...allValues) - 2;
            const maxVal = Math.max(...allValues) + 2;
            const range = maxVal - minVal || 1;

            // Batas Min dan Max dari Setting
            const minLimit = Store.settings.suhuMin || 18;
            const maxLimit = Store.settings.suhuMax || 26;

            // Grid lines
            ctx.strokeStyle = '#f0f0f0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = pad.top + (ch / 5) * i;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();
                
                ctx.fillStyle = '#999';
                ctx.font = '9px Arial';
                ctx.textAlign = 'right';
                const val = maxVal - (range / 5) * i;
                ctx.fillText(val.toFixed(1), pad.left - 5, y + 3);
            }

            // Draw batas min dan max
            const minY = pad.top + ch - ((minLimit - minVal) / range) * ch;
            const maxY = pad.top + ch - ((maxLimit - minVal) / range) * ch;
            
            // Area batas
            ctx.fillStyle = 'rgba(34, 197, 94, 0.05)';
            ctx.fillRect(pad.left, Math.min(minY, maxY), cw, Math.abs(maxY - minY));
            
            // Garis batas min (kuning)
            ctx.setLineDash([6, 4]);
            ctx.strokeStyle = '#eab308';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(pad.left, minY);
            ctx.lineTo(w - pad.right, minY);
            ctx.stroke();
            
            // Garis batas max (merah)
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(pad.left, maxY);
            ctx.lineTo(w - pad.right, maxY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Label batas
            ctx.fillStyle = '#eab308';
            ctx.font = '9px Arial';
            ctx.textAlign = 'right';
            ctx.fillText('Min: ' + minLimit.toFixed(1) + '°C', pad.left - 3, minY + 3);
            ctx.fillStyle = '#ef4444';
            ctx.fillText('Max: ' + maxLimit.toFixed(1) + '°C', pad.left - 3, maxY + 3);

            function drawHistoryLine(values, color) {
                if (values.length < 2) return;
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                values.forEach((v, i) => {
                    const x = pad.left + (i / (values.length - 1)) * cw;
                    const y = pad.top + ch - ((v - minVal) / range) * ch;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                });
                ctx.stroke();

                values.forEach((v, i) => {
                    const x = pad.left + (i / (values.length - 1)) * cw;
                    const y = pad.top + ch - ((v - minVal) / range) * ch;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            drawHistoryLine(suhuValues, '#f97316');
            drawHistoryLine(kelembabanValues, '#3b82f6');
            drawHistoryLine(tekananValues, '#ef4444');

            // X-axis labels
            ctx.fillStyle = '#999';
            ctx.font = '8px Arial';
            ctx.textAlign = 'center';
            const step = Math.max(1, Math.floor(data.length / 10));
            data.forEach((d, i) => {
                if (i % step === 0 || i === data.length - 1) {
                    const x = pad.left + (i / (data.length - 1)) * cw;
                    const label = formatTime(new Date(d.waktu));
                    ctx.fillText(label, x, h - 10);
                }
            });
        }

        function getFilteredDataForExport() {
            let data = [...Store.historyData];
            const search = Store.historyFilters.search?.toLowerCase() || '';
            const dateFrom = Store.historyFilters.dateFrom;
            const dateTo = Store.historyFilters.dateTo;
            const statusFilter = Store.historyFilters.status || 'all';

            if (search) {
                data = data.filter(h => {
                    const dateStr = formatDateTime(new Date(h.waktu)).toLowerCase();
                    return dateStr.includes(search) || 
                           h.userlogin?.toLowerCase().includes(search) ||
                           h.suhu.toString().includes(search) ||
                           h.kelembaban.toString().includes(search) ||
                           h.tekanan.toString().includes(search);
                });
            }

            if (dateFrom) {
                const from = new Date(dateFrom);
                data = data.filter(h => new Date(h.waktu) >= from);
            }

            if (dateTo) {
                const to = new Date(dateTo);
                to.setHours(23, 59, 59);
                data = data.filter(h => new Date(h.waktu) <= to);
            }

            if (statusFilter !== 'all') {
                data = data.filter(h => h.status === statusFilter);
            }

            data.sort((a, b) => new Date(b.waktu) - new Date(a.waktu));

        function exportHistoryCSV() {
            const data = getFilteredDataForExport();
            if (data.length === 0) {
                showToast('⚠️ Tidak ada data untuk diekspor!', 'warning');
                return;
            }

            let csv = 'Tanggal/Jam,Suhu (°C),Kelembaban (%),Tekanan (hPa),Trend,Status,User Login\n';
            data.forEach(h => {
                const trendMap = { 'up': 'Naik', 'down': 'Turun', 'stable': 'Stabil' };
                const statusMap = { 'normal': 'Normal', 'warning': 'Warning', 'danger': 'Danger' };
                csv += `${formatDateTime(new Date(h.waktu))},${h.suhu.toFixed(1)},${h.kelembaban.toFixed(1)},${h.tekanan.toFixed(1)},${trendMap[h.trend] || 'Stabil'},${statusMap[h.status] || 'Normal'},${h.userlogin || 'system'}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `history_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showToast('✅ CSV berhasil diekspor!', 'success');
        }

            const data = getFilteredDataForExport();
            if (data.length === 0) {

            const excelData = data.map(h => ({
                'Tanggal/Jam': formatDateTime(new Date(h.waktu)),
                'Suhu (°C)': h.suhu.toFixed(1),
                'Kelembaban (%)': h.kelembaban.toFixed(1),

        function exportChartPNG() {
            const container = document.getElementById('historyChartContainer');
            if (!container) {
                showToast('⚠️ Chart tidak ditemukan!', 'warning');
                return;
            }

            html2canvas(container, {
                scale: 2,
                backgroundColor: '#ffffff',
                allowTaint: true,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `history_chart_${new Date().toISOString().split('T')[0]}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast('✅ PNG berhasil diekspor!', 'success');
            }).catch(err => {
                console.error('❌ Error exporting PNG:', err);
                showToast('❌ Gagal ekspor PNG!', 'error');
            });
        }

        function exportChartPDF() {
            const container = document.getElementById('historyChartContainer');
            if (!container) {
                showToast('⚠️ Chart tidak ditemukan!', 'warning');
                return;
            }

            html2canvas(container, {
                scale: 2,
                backgroundColor: '#ffffff',
                allowTaint: true,
                useCORS: true
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('landscape', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`history_chart_${new Date().toISOString().split('T')[0]}.pdf`);
                showToast('✅ PDF berhasil diekspor!', 'success');
            }).catch(err => {
                console.error('❌ Error exporting PDF:', err);
                showToast('❌ Gagal ekspor PDF!', 'error');
            });
        }

        // ============================================================
        // LOGIN / LOGOUT
        // ============================================================
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value.trim();

            try {
                seedDefaultData();

                const result = await API.post('/api/login', { username, password });
                if (result.success) {
                    Store.currentUser = result.user;
                    Store.isLoggedIn = true;
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    
                    updateSidebarUser();
                    renderSidebarByAccess();

                    await Promise.all([
                        loadUsers(),
                        loadSchedules(),
                        loadHistory(),
                        loadSettings(),
                        loadProfile()
                    ]);

                    // Start save interval setelah login
                    startSaveInterval();

                    navigateTo('dashboard');
                    showToast('👋 Selamat datang, ' + result.user.name + '!', 'success');
                } else {
                    document.getElementById('loginError').style.display = 'block';
                    document.getElementById('loginError').textContent = result.message || 'Username atau password salah!';
                    setTimeout(() => {
                        document.getElementById('loginError').style.display = 'none';
                    }, 3000);
                }
            } catch (error) {
                console.error('❌ Login error:', error);
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('loginError').textContent = 'Terjadi kesalahan!';
            }
        }

        function handleLogout() {
            if (confirm('Yakin logout?')) {
                Store.isLoggedIn = false;
                Store.currentUser = null;
                if (saveIntervalTimer) {
                    clearInterval(saveIntervalTimer);
                    saveIntervalTimer = null;
                }
                document.getElementById('app').style.display = 'none';
                document.getElementById('loginPage').style.display = 'flex';
                showToast('👋 Sampai jumpa!', 'info');
            }
        }
